name: Monthly Law Pipeline

on:
  schedule:
    - cron: '0 1 1 * *'   # 매월 1일 01:00 UTC
  workflow_dispatch:
    inputs:
      country:
        description: '수집 대상'
        required: true
        default: 'ALL'
        type: choice
        options: [ALL, JP, KR]
      phase:
        description: '단계 (0=전체, 1=핵심법령, 2=특별법·연금, 3=세법)'
        required: true
        default: '1'
        type: choice
        options: ['0', '1', '2', '3']
      run_crawler:
        description: 'FSA + 행정규칙 크롤러 실행'
        required: false
        default: 'true'
        type: boolean

jobs:
  update-laws:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install requests supabase google-generativeai beautifulsoup4

      # ── 1. 법령 파이프라인 (e-Gov + 법제처 API) ────────────────────────────
      - name: Run pipeline.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          HOUREI_API_KEY:       ${{ secrets.HOUREI_API_KEY }}
        run: |
          python scripts/pipeline.py \
            --country "${{ github.event.inputs.country || 'ALL' }}" \
            --phase   "${{ github.event.inputs.phase   || '1'   }}"

      # ── 2. 크롤러 (FSA 감독지침 + 법제처 행정규칙) ────────────────────────
      - name: Run crawler.py
        if: ${{ github.event.inputs.run_crawler != 'false' }}
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          HOUREI_API_KEY:       ${{ secrets.HOUREI_API_KEY }}
        run: |
          python scripts/crawler.py \
            --target "${{ github.event.inputs.country || 'ALL' }}"

      # ── 3. laws_index.json → GitHub Pages 커밋 ────────────────────────────
      - name: Commit laws_index.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/laws_index.json
          git diff --cached --quiet || \
            git commit -m "chore: law update $(date +'%Y-%m-%d') [phase=${{ github.event.inputs.phase || '1' }}]"
          git push

      # ── 4. Slack 알림 ──────────────────────────────────────────────────────
      - name: Slack (success)
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ *법령 업데이트 완료*\n대상: `${{ github.event.inputs.country || 'ALL' }}` phase=`${{ github.event.inputs.phase || '1' }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|로그 보기>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack (failure)
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ *법령 업데이트 실패*\n대상: `${{ github.event.inputs.country || 'ALL' }}` phase=`${{ github.event.inputs.phase || '1' }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|로그 확인>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
